<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- color-scheme defaults to following the user's system preference.
		     The inline script below pins it to the user's saved choice (if any)
		     before first paint to avoid a flash of un-themed content. -->
		<meta name="color-scheme" content="light dark" />
		<!-- Open the TLS handshake to the mteb FastAPI host (Hugging Face Space) in
		     parallel with the HTML parse — every page makes at least one fetch
		     against it, so the first request lands ~150 ms faster on cold hits. -->
		<link rel="preconnect" href="https://mteb-leaderboardv2-api.hf.space" crossorigin />
		<link rel="dns-prefetch" href="https://mteb-leaderboardv2-api.hf.space" />
		<!-- Speculation Rules: prefetch the top-nav routes once the user shows
		     intent (moderate eagerness = ~200 ms hover). Pairs with the
		     `data-sveltekit-preload-data="hover"` on <body> which warms the
		     SvelteKit route module + load functions. Together: same-origin
		     code is ready, and the page's API responses land in the service
		     cache (cachedHttp) on first activation. -->
		<script type="speculationrules">
			{
				"prefetch": [
					{
						"where": {
							"or": [
								{ "href_matches": "/" },
								{ "href_matches": "/benchmarks" },
								{ "href_matches": "/models" },
								{ "href_matches": "/tasks" },
								{ "href_matches": "/compare" }
							]
						},
						"eagerness": "moderate"
					}
				]
			}
		</script>
		<script>
			{
				try {
					const saved = localStorage.getItem('color-scheme');
					if (saved === 'light' || saved === 'dark') {
						document.documentElement.setAttribute('data-theme', saved);
						const meta = document.querySelector('meta[name="color-scheme"]');
						if (meta) meta.setAttribute('content', saved);
					}
				} catch {
					/* localStorage may throw in private mode — fall back to system */
				}
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
