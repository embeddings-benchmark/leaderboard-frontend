<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- color-scheme defaults to following the user's system preference.
		     The inline script below pins it to the user's saved choice (if any)
		     before first paint to avoid a flash of un-themed content. -->
		<meta name="color-scheme" content="light dark" />
		<!-- Open the TLS handshake to the mteb FastAPI host (Hugging Face Space) in
		     parallel with the HTML parse — every page makes at least one fetch
		     against it, so the first request lands ~150 ms faster on cold hits.
		     `preconnect` already implies DNS resolution, so a separate
		     `dns-prefetch` would be redundant. -->
		<link rel="preconnect" href="https://mteb-leaderboardv2-api.hf.space" crossorigin />
		<!-- Theme pin runs first so it lands before any layout / speculation
		     work — keeps the no-flash invariant tight on slow CPUs. -->
		<script>
			{
				try {
					const saved = localStorage.getItem('color-scheme');
					if (saved === 'light' || saved === 'dark') {
						document.documentElement.setAttribute('data-theme', saved);
						const meta = document.querySelector('meta[name="color-scheme"]');
						if (meta) meta.setAttribute('content', saved);
					}
				} catch {
					/* localStorage may throw in private mode — fall back to system */
				}
			}
		</script>
		<!-- Speculation Rules:
		     - Home + /benchmarks stay `moderate` (~200 ms hover) since those are
		       the most common destinations from any page.
		     - /models, /tasks, /compare drop to `conservative` (prefetch on
		       pointer-down) — users who never visit them save the prefetch
		       cost, hover-flickers don't accidentally fetch.
		     Pairs with `data-sveltekit-preload-data="hover"` on <body> for the
		     SvelteKit route module + load functions. -->
		<script type="speculationrules">
			{
				"prefetch": [
					{
						"where": {
							"or": [{ "href_matches": "/" }, { "href_matches": "/benchmarks" }]
						},
						"eagerness": "moderate"
					},
					{
						"where": {
							"or": [
								{ "href_matches": "/models" },
								{ "href_matches": "/tasks" },
								{ "href_matches": "/compare" }
							]
						},
						"eagerness": "conservative"
					}
				]
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<!-- The body marker is wrapped in a `display: contents` div per SvelteKit's
		     recommendation — some browser extensions inject siblings into body and
		     that interferes with hydration. The wrapper is transparent to layout.
		     Do NOT reference the literal body-marker token in this comment: it's a
		     simple string-substitution and would be replaced inside the comment too,
		     breaking the HTML. -->
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
