<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_stage.css" />
    <style>
      .stage {
        width: 1640px;
        height: 500px;
      }
      .row {
        position: absolute;
        inset: 60px;
        display: flex;
        gap: 60px;
        align-items: center;
        justify-content: center;
        z-index: 3;
      }
      .row img {
        display: block;
        max-height: 380px;
        width: auto;
        height: auto;
        border-radius: 10px;
        box-shadow:
          0 22px 50px -16px rgba(10, 22, 55, 0.32),
          0 6px 16px -4px rgba(10, 22, 55, 0.18),
          0 0 0 1px rgba(37, 99, 235, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <svg class="dots"></svg>
      <div class="row">
        <img src="original/C01n7urmyT-xhL3KCU8ji.png" alt="" />
        <img src="_filter-tip-raw.png" alt="" />
      </div>
    </div>
    <script src="_dots.js"></script>
    <script>
      paintDots(document.querySelector('svg.dots'), {
        seed: 97,
        count: 220,
        minDist: 34,
        w: 1640,
        h: 500,
      });
    </script>
  </body>
</html>
