<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_stage.css" />
    <style>
      .title {
        position: absolute;
        left: 50%;
        bottom: 130px;
        transform: translateX(-50%);
        z-index: 3;
        text-align: center;
      }
      .title h1 {
        font-size: 78px;
        font-weight: 800;
        letter-spacing: -2px;
        line-height: 1;
        color: #0b1a3a;
      }
      .title .accent {
        color: #2563eb;
      }
      .title p {
        margin-top: 22px;
        font-size: 30px;
        line-height: 1.35;
        color: #3b475e;
      }
      .title .pill {
        display: inline-block;
        margin-bottom: 22px;
        padding: 8px 16px;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.4px;
        text-transform: uppercase;
        color: #1d4ed8;
        background: rgba(37, 99, 235, 0.1);
        border: 1.5px solid rgba(37, 99, 235, 0.35);
        border-radius: 999px;
      }
      .hero-card {
        position: absolute;
        left: 50%;
        top: 110px;
        transform: translateX(-50%);
        width: 1500px;
        z-index: 2;
      }
      .hero-card::before {
        content: '';
        position: absolute;
        inset: -22px;
        border-radius: 22px;
        background: radial-gradient(
          ellipse at center,
          rgba(37, 99, 235, 0.32),
          rgba(37, 99, 235, 0) 70%
        );
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <svg class="dots"></svg>
      <div class="title">
        <h1>A <span class="accent">faster</span> MTEB Leaderboard.</h1>
        <p>Better. Faster. Mobile.</p>
      </div>
      <div class="card hero-card"><img src="leaderboardv3.png" alt="MTEB v3" /></div>
    </div>
    <script src="_dots.js"></script>
    <script>
      paintDots(document.querySelector('svg.dots'), { seed: 11, count: 480, minDist: 40 });
    </script>
  </body>
</html>
