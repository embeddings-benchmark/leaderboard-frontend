<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_stage.css" />
    <style>
      .stage {
        width: 2240px;
        height: 660px;
      }
      .row {
        position: absolute;
        inset: 60px 60px auto 60px;
        display: flex;
        gap: 60px;
        align-items: flex-start;
        z-index: 3;
      }
      .panel {
        flex: 1;
        background: transparent;
      }
      .panel img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 12px;
        box-shadow:
          0 22px 50px -16px rgba(10, 22, 55, 0.32),
          0 6px 16px -4px rgba(10, 22, 55, 0.18),
          0 0 0 1px rgba(37, 99, 235, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <svg class="dots"></svg>
      <div class="row">
        <div class="panel"><img src="_tasks-cards-raw.png" alt="" /></div>
        <div class="panel"><img src="_tasks-table-raw.png" alt="" /></div>
      </div>
    </div>
    <script src="_dots.js"></script>
    <script>
      paintDots(document.querySelector('svg.dots'), {
        seed: 73,
        count: 240,
        minDist: 36,
        w: 2240,
        h: 660,
      });
    </script>
  </body>
</html>
