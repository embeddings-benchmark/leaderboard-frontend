name: Common setup
description: setup-node + npm ci. Repo must already be checked out.

inputs:
  node-version:
    description: Node version (kept in sync with engines.node).
    required: false
    default: '24'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash
