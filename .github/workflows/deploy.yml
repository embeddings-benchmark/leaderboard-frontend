name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /${{ github.event.repository.name }}
      PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || 'https://mteb-leaderboard-backend.hf.space' }}
      PUBLIC_SITE_URL: ${{ vars.GH_PAGES_SITE_URL || 'https://embeddings-benchmark.github.io' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/common

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
