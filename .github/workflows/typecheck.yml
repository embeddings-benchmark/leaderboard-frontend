name: Type check

on:
  push:
    branches: [main, integration]
  pull_request:
    branches: [main, integration]
  workflow_dispatch:

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/common
      - name: svelte-check
        # `$env/static/public` types are generated from env vars present
        # at `svelte-kit sync` time. CI has no .env, so seed the public
        # vars here — values don't matter, only that the keys exist.
        env:
          PUBLIC_API_URL: https://mteb-leaderboard-backend.hf.space
          PUBLIC_SITE_URL: https://mteb-leaderboardv3.hf.space
        run: npm run check
