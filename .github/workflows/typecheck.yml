name: Type check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    env:
      PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL || 'https://mteb-leaderboard-backend.hf.space' }}
      PUBLIC_SITE_URL: ${{ vars.HF_SITE_URL || 'https://mteb-leaderboardv3.hf.space' }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/common
      - name: svelte-check
        run: npm run check
