# Runs the project's lint + check scripts before each commit.
# Install once per clone: `pre-commit install`.
# Skip a commit with: `git commit --no-verify` (avoid).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      # JSON formatting is owned by prettier (tabs, per .prettierrc).
      # `pretty-format-json` enforces 4-space indent and disagrees with
      # prettier, so it's scoped out of `*.json` to avoid the two
      # formatters fighting each other and failing every commit that
      # touches a JSON file.
      - id: pretty-format-json
        args:
          - '--autofix'
          - '--indent=4'
          - '--no-sort-keys'
        exclude: '\.json$'
      - id: end-of-file-fixer # generated a lot of changes
      - id: trailing-whitespace
      - id: check-toml

  - repo: local
    hooks:
      - id: lint
        name: npm run lint
        entry: npm run lint
        language: system
        pass_filenames: false
        types_or: [javascript, ts, svelte, css, html]

      - id: check
        name: npm run check
        entry: npm run check
        language: system
        pass_filenames: false
        types_or: [ts, svelte]
